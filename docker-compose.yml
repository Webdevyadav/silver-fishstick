version: '3.8'

services:
  rosteriq-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DUCKDB_PATH=/app/data/analytics.duckdb
      - SQLITE_PATH=/app/data/episodic_memory.db
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=info
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - rosteriq-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - rosteriq-network
    command: redis-server --appendonly yes

  rosteriq-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    depends_on:
      - rosteriq-api
    restart: unless-stopped
    networks:
      - rosteriq-network

volumes:
  redis_data:

networks:
  rosteriq-network:
    driver: bridge