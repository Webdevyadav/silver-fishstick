version: '3.8'

services:
  agent-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - MODEL_NAME=${MODEL_NAME:-gpt-4-turbo-preview}
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../chroma_db:/app/chroma_db
      - ../outputs:/app/outputs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://agent-api:8000
    depends_on:
      - agent-api
    restart: unless-stopped

networks:
  default:
    name: agent-network
